# Requiere en GitHub → Settings → Secrets and variables → Actions:
#   VERCEL_TOKEN       (https://vercel.com/account/tokens)
#   VERCEL_ORG_ID      (valor de .vercel/project.json → orgId)
#   VERCEL_PROJECT_ID  (valor de .vercel/project.json → projectId)

name: Deploy production (Vercel)

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install and build
        run: npm ci && npm run build:vercel

      - name: Deploy to Vercel
        run: npx vercel deploy --prebuilt --prod --yes --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
